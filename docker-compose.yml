services:
  postgres:
    image: postgres:16-alpine
    container_name: derby-postgres
    environment:
      POSTGRES_USER: derby
      POSTGRES_PASSWORD: derby
      POSTGRES_DB: derby
    ports:
      - "5432:5432"
    volumes:
      - derby-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U derby -d derby"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  derby-pg-data:
